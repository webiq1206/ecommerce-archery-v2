packages:
  "framer-motion": "For premium smooth animations and page transitions"
  "clsx": "For conditional tailwind class merging"
  "tailwind-merge": "For reliable tailwind class merging in components"
  "date-fns": "For formatting dates in admin and order views"
  "recharts": "For admin dashboard analytics charts"

images:
  - path: "artifacts/archery-store/public/images/hero-bg.png"
    description: "Cinematic wide shot of a bowhunter at dawn in misty pine mountains, premium outdoor aesthetic, deep forest greens and soft warm amber morning light"
    aspect_ratio: "16:9"
  - path: "artifacts/archery-store/public/images/cat-bows.png"
    description: "High-end precision carbon fiber compound bow resting on a weathered log, moody studio lighting"
    aspect_ratio: "1:1"
  - path: "artifacts/archery-store/public/images/cat-arrows.png"
    description: "Bundle of premium carbon hunting arrows with bright fletching in a quiver"
    aspect_ratio: "1:1"
  - path: "artifacts/archery-store/public/images/cat-apparel.png"
    description: "Premium technical camouflage hunting jacket folded neatly on dark slate"
    aspect_ratio: "1:1"
  - path: "artifacts/archery-store/public/images/brand-story.png"
    description: "Close up of an archer's hands drawing a bowstring, focused, rugged, high detail, desaturated tones with a pop of gold"
