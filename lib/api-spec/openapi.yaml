    post:
      operationId: subscribeEmail
      tags: [email]
      summary: Subscribe to email list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                firstName:
                  type: string
                source:
                  type: string
              required: [email]
      responses:
        "201":
          description: Subscribed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]

